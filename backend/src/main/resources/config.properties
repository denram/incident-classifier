# ===================================================================
# AI Provider Configuration
# ===================================================================

# Provider selection
# Available providers: ANTHROPIC, OPENAI, GEMINI
ai.provider=anthropic

# -------------------------------------------------------------------
# Anthropic (Claude) Configuration
# -------------------------------------------------------------------
ai.anthropic.api-key=your-anthropic-api-key
ai.anthropic.model=claude-opus-4-6
ai.anthropic.api-url=https://api.anthropic.com/v1/messages
ai.anthropic.version=2023-06-01
ai.anthropic.max-tokens=4096

# -------------------------------------------------------------------
# OpenAI Configuration
# -------------------------------------------------------------------
ai.openai.api-key=your.openai.api-key
ai.openai.model=gpt-4o
ai.openai.api-url=https://api.openai.com/v1/chat/completions
ai.openai.max-tokens=4096

# -------------------------------------------------------------------
# Google Gemini Configuration
# -------------------------------------------------------------------
ai.gemini.api-key=your-gemini-api-key
ai.gemini.model=gemini-2.0-flash
ai.gemini.max-output-tokens=4096
